<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} — preview</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <a href="{{ url_for('index') }}">← Back</a>
    <h1>{{ title }}</h1>
    <p class="sub">Showing {{ shown }} of {{ total_rows }} rows · <a href="{{ url_for('download', rel=rel) }}">Download CSV</a></p>
  </header>
  <div class="scroll-wrap">{{ table_html | safe }}</div>
</body>
</html>
